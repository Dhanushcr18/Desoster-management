version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: disaster-hub-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=disaster-hub
    networks:
      - disaster-hub-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: disaster-hub-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/disaster-hub
      - JWT_SECRET=hackathon-jwt-secret-change-in-production
      - JWT_EXPIRES_IN=7d
      - NODE_ENV=development
    depends_on:
      - mongodb
    networks:
      - disaster-hub-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: disaster-hub-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
      - VITE_SOCKET_URL=http://localhost:3000
    depends_on:
      - backend
    networks:
      - disaster-hub-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongodb_data:

networks:
  disaster-hub-network:
    driver: bridge
